syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.ejercicio4";
option java_outer_classname = "AppointmentProto";

service AppointmentService {
  rpc RequestAppointment (AppointmentRequest) returns (AppointmentResponse);
  rpc CancelAppointment  (CancelRequest)      returns (CancelResponse);
  rpc GetAppointments    (StudentRequest)      returns (AppointmentList);
}

enum ServiceType {
  MEDICINE    = 0;
  PSYCHOLOGY  = 1;
  DENTISTRY   = 2;
}

enum Status {
  REQUESTED  = 0;
  CANCELLED  = 1;
  ATTENDED   = 2;
}

message Student {
  string id                  = 1;
  string name                = 2;
  string institutional_email = 3;
}

message Appointment {
  string      id           = 1;
  string      student_id   = 2;
  ServiceType service_type = 3;
  string      date         = 4;
  Status      status       = 5;
}

message AppointmentRequest {
  string      student_id   = 1;
  ServiceType service_type = 2;
  string      date         = 3;
}

message AppointmentResponse {
  bool        success     = 1;
  string      message     = 2;
  Appointment appointment = 3;
}

message CancelRequest {
  string appointment_id = 1;
}

message CancelResponse {
  bool   success = 1;
  string message = 2;
}

message StudentRequest {
  string student_id = 1;
}

message AppointmentList {
  repeated Appointment appointments = 1;
}