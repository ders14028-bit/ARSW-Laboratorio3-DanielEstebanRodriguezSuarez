syntax = "proto3";

option java_multiple_files = true;
option java_package = "edu.eci.arsw.ejercicio5";
option java_outer_classname = "GymProto";

import "medical.proto";

service GymService {
  rpc GetSessions (Empty) returns (SessionList);
  rpc ReserveSession (GymReservationRequest) returns (GymReservationResponse);
}

message GymSession {
  string id = 1;
  string activity = 2;
  string timeSlot = 3;
  int32 capacity = 4;
  int32 reserved = 5;
}

message SessionList {
  repeated GymSession sessions = 1;
}

message GymReservationRequest {
  string studentId = 1;
  string sessionId = 2;
}

message GymReservationResponse {
  bool success = 1;
  string message = 2;
}